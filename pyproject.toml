[project]
name = "aic2026"
version = "0.0.1"
description = "AIC2026 evaluation harness and supporting infrastructure"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "AIC2026 team" },
]
dependencies = [
    "pydantic>=2.7",
    "typer>=0.12",
    "jinja2>=3.1",
    "httpx>=0.27",
]

[project.scripts]
eval = "aic2026.cli.eval:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aic2026"]

[tool.hatch.build.targets.sdist]
include = [
    "src/aic2026",
    "tests",
    "pyproject.toml",
    "README.md",
    "ruff.toml",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "integration: end-to-end tests that may spawn subprocesses or hit local services",
]
