[project]
name = "aic2026"
version = "0.0.1"
description = "AIC2026 evaluation harness and supporting infrastructure"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "AIC2026 team" },
]
dependencies = [
    "pydantic>=2.7",
    "typer>=0.12",
    "jinja2>=3.1",
    "httpx>=0.27",
    "numpy>=1.26",
]

[project.optional-dependencies]
# SPEC-0004: real image-text encoder backbones. Not installed in CI - the
# DummyEmbedder is what unit tests exercise. Install locally via
# `uv sync --extra embedding` to run SigLip2Embedder against real weights.
embedding = [
    "torch>=2.4",
    "open-clip-torch>=2.32",
    "pillow>=10",
]

[project.scripts]
eval = "aic2026.cli.eval:main"
embed = "aic2026.cli.embed:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aic2026"]

[tool.hatch.build.targets.sdist]
include = [
    "src/aic2026",
    "tests",
    "pyproject.toml",
    "README.md",
    "ruff.toml",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config"]
markers = [
    "integration: end-to-end tests that may spawn subprocesses or hit local services",
]
