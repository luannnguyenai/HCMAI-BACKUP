# Implements SPEC-0021 (CI pipeline: lint + test + smoke-eval gate).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

      # SPEC-0021 AC3: a "does it run" smoke gate, not a score gate.
      # Score-threshold enforcement is deferred to SPEC-0001 AC7.
      - name: Smoke eval (20-task stub backend)
        run: ./bin/eval --tasks tests/mock_tasks/smoke_20.jsonl --system "ci-${GITHUB_SHA::7}"
